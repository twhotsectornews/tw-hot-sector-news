name: update-hot-sector-news

on:
  workflow_dispatch:          # 主要：由 cron-job.org 觸發
  schedule:
    # GitHub 內建 cron 為 best-effort 後備（曾觀察到漏跑）。UTC = 台北 -8。
    # 每天跑（user 要求：週末/假日也要看新聞）；非交易日漲停判定有防呆、Gemini 無新聞不呼叫，白跑無害。
    # 盤中時段：台北 11/12/13/14 點 → UTC 03/04/05/06（漲停用 MIS 即時，隨盤面亮燈/撤銷）。
    - cron: "0 3,4,5,6 * * *"
    # 盤後：台北 17:10、18:40 → UTC 09:10、10:40。證交所正式盤後資料 16:30–18:00 發布，
    # 這兩班把當日漲停定版（17:10 若還沒發布會自動保留既有標記，18:40 補上）。
    - cron: "10 9 * * *"
    - cron: "40 10 * * *"
  push:
    branches: [main]          # 改程式碼即重新部署頁面

permissions:
  contents: write             # commit 回 news.json（頁面由 Pages branch 模式直接 serve main:/docs，push 即發布）

concurrency:
  group: hot-sector-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate news.json
        id: gen
        continue-on-error: true   # 抓取/AI 失敗不阻擋既有頁面部署
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-news.mjs

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news.json docs/history || true
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git commit -m "chore(data): 更新熱門族群新聞 [skip ci]"
            # rerun／並行 run 可能已推過資料 commit → 先 rebase（衝突時以本次新產資料為準）再推
            git pull --rebase -X theirs origin main || true
            git push
          fi

      # 部署改用 Pages「branch 模式」直接 serve main:/docs（上面 commit 推上去即自動發布），
      # 不再走 actions 的 artifact 部署管線（該管線 2026-07 曾連續抽風、狂寄失敗信）。
      # 這步只在「資料產生失敗」時讓 run 轉紅寄信 —— 紅信 = 真的要處理。
      - name: Alert if generation failed
        if: steps.gen.outcome == 'failure'
        run: |
          echo "::error::gen-news.mjs 失敗，資料未更新（頁面仍為既有內容）"
          exit 1
