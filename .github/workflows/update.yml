name: update-hot-sector-news

on:
  workflow_dispatch:          # 主要：由 cron-job.org 觸發
  schedule:
    # GitHub 內建 cron 為 best-effort 後備（曾觀察到漏跑）。UTC = 台北 -8。僅平日。
    # 盤中：台北 11/12/13/14 點 → UTC 03/04/05/06（漲停用 MIS 即時，隨盤面亮燈/撤銷）。
    - cron: "0 3,4,5,6 * * 1-5"
    # 盤後：台北 17:10、18:40 → UTC 09:10、10:40。證交所正式盤後資料 16:30–18:00 發布，
    # 這兩班把當日漲停定版（17:10 若還沒發布會自動保留既有標記，18:40 補上）。
    - cron: "10 9 * * 1-5"
    - cron: "40 10 * * 1-5"
  push:
    branches: [main]          # 改程式碼即重新部署頁面

permissions:
  contents: write             # commit 回 news.json
  pages: write
  id-token: write

concurrency:
  group: hot-sector-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate news.json
        id: gen
        continue-on-error: true   # 抓取/AI 失敗不阻擋既有頁面部署
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-news.mjs

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/news.json docs/history || true
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git commit -m "chore(data): 更新熱門族群新聞 [skip ci]"
            # rerun／並行 run 可能已推過資料 commit → 先 rebase（衝突時以本次新產資料為準）再推
            git pull --rebase -X theirs origin main || true
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      # 放在最後：資料產生失敗時讓整個 run 轉紅（GitHub 會寄通知信），
      # 但因為排在 deploy 之後，既有頁面照常部署、不受影響。
      - name: Alert if generation failed
        if: steps.gen.outcome == 'failure'
        run: |
          echo "::error::gen-news.mjs 失敗，資料未更新（頁面仍為既有內容）"
          exit 1
